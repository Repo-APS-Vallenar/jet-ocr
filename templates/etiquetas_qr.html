<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Etiquetas QR - TIC Altiplano Norte</title>
    <style>
        @media print {
            .no-print { display: none; }
            body { margin: 0; padding: 0; }
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10mm;
            background: #f0f0f0;
        }
        .sheet {
            background: white;
            width: 190mm;
            margin: 0 auto;
            padding: 10mm;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5mm;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .label {
            border: 1px dashed #ccc;
            padding: 5mm;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 35mm;
            overflow: hidden;
            background: #fff;
        }
        .label-info {
            width: 60%;
        }
        .inst {
            font-size: 8px;
            font-weight: bold;
            color: #666;
            margin-bottom: 2px;
            text-transform: uppercase;
        }
        .model {
            font-size: 11px;
            font-weight: bold;
            color: #000;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .sn {
            font-size: 9px;
            color: #333;
            font-family: monospace;
        }
        .qr-code {
            width: 25mm;
            height: 25mm;
        }
        .qr-code img {
            width: 100%;
            height: 100%;
        }
        .btn-print {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0A2647;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <a href="javascript:window.print()" class="btn-print no-print">🖨️ Imprimir Etiquetas</a>

    <div class="sheet">
        {% for eq in equipos %}
        <div class="label">
            <div class="label-info">
                <div class="inst">TIC Altiplano Norte</div>
                <div class="model">{{ eq.nombre }}</div>
                <div class="sn">S/N: {{ eq.sn }}</div>
            </div>
            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data={{ base_url }}/q/{{ eq.id }}" alt="QR">
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
