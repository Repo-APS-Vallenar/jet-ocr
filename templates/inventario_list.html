<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Inventario | Jet-OCR</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --danger: #ef4444;
            --modal-bg: rgba(15, 23, 42, 0.9);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 12px; color: var(--text-muted); padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        td { padding: 15px; font-size: 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        .btn { padding: 8px 16px; border-radius: 10px; text-decoration: none; font-weight: 600; cursor: pointer; border: none; font-family: inherit; }
        .btn-primary { background: var(--primary); color: white; }

        /* MODAL STYLES */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: var(--modal-bg); backdrop-filter: blur(5px);
            justify-content: center; align-items: center;
        }

        .modal-content {
            background: var(--card-bg); width: 90%; max-width: 600px; max-height: 90vh;
            border-radius: 24px; padding: 30px; position: relative; overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; color: var(--text-muted); }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        input, select {
            width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: white; font-size: 14px;
        }

        .dynamic-fields {
            margin-top: 20px; padding-top: 20px; border-top: 1px dashed rgba(255,255,255,0.1);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Inventario General</h1>
            <p>{{ equipos|length }} equipos registrados</p>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre / Modelo</th>
                        <th>S/N</th>
                        <th>Ubicación</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for eq in equipos %}
                    <tr>
                        <td>{{ eq[0] }}</td>
                        <td><strong>{{ eq[1] }}</strong><br><small style="color:var(--text-muted)">{{ eq[5] }}</small></td>
                        <td><code>{{ eq[2] }}</code></td>
                        <td>{{ eq[3] or 'No asignada' }}</td>
                        <td>{{ eq[4] }}</td>
                        <td>
                            <button onclick="openEditModal({{ eq[0] }})" style="background:none; border:none; cursor:pointer;">✏️</button>
                            <a href="{{ url_for('ver_equipo', id_equipo=eq[0]) }}" target="_blank" style="text-decoration:none;">👁️</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL DE EDICIÓN -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Editar Equipo</h2>
            <form id="editForm">
                <input type="hidden" id="edit_id">
                
                <div class="form-group">
                    <label>Nombre del Equipo</label>
                    <input type="text" id="edit_nombre" required>
                </div>

                <div class="grid">
                    <div class="form-group">
                        <label>S/N (Serie)</label>
                        <input type="text" id="edit_sn" required>
                    </div>
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="edit_categoria">
                            <option value="Hardware">Hardware</option>
                            <option value="Redes">Redes</option>
                            <option value="Periférico">Periférico</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Ubicación (Workstation)</label>
                    <select id="edit_workstation">
                        <option value="">-- Sin Vincular --</option>
                        {% for ws in workstations %}
                        <option value="{{ ws[0] }}">{{ ws[1] }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Estado</label>
                    <select id="edit_estado">
                        <option value="Operativo">Operativo</option>
                        <option value="En Reparación">En Reparación</option>
                        <option value="De Baja">De Baja</option>
                    </select>
                </div>

                <div class="dynamic-fields" id="dynamicFields">
                    <!-- Los campos del Excel se cargarán aquí -->
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:20px;">Guardar Cambios</button>
            </form>
        </div>
    </div>

    <script>
        function openEditModal(id) {
            fetch(`/api/equipo/${id}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('edit_id').value = data.id;
                    document.getElementById('edit_nombre').value = data.nombre;
                    document.getElementById('edit_sn').value = data.sn;
                    document.getElementById('edit_categoria').value = data.categoria;
                    document.getElementById('edit_estado').value = data.estado;
                    document.getElementById('edit_workstation').value = data.workstation_id || "";
                    
                    // Limpiar y cargar campos dinámicos
                    const container = document.getElementById('dynamicFields');
                    container.innerHTML = '<h3>Detalles Técnicos (Excel)</h3>';
                    
                    Object.keys(data.extra).forEach(key => {
                        const div = document.createElement('div');
                        div.className = 'form-group';
                        div.innerHTML = `
                            <label style="text-transform: capitalize;">${key.replace(/_/g, ' ')}</label>
                            <input type="text" class="extra-field" data-key="${key}" value="${data.extra[key]}">
                        `;
                        container.appendChild(div);
                    });
                    
                    document.getElementById('editModal').style.display = 'flex';
                });
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        document.getElementById('editForm').onsubmit = function(e) {
            e.preventDefault();
            const id = document.getElementById('edit_id').value;
            
            const extra = {};
            document.querySelectorAll('.extra-field').forEach(input => {
                extra[input.getAttribute('data-key')] = input.value;
            });

            const payload = {
                nombre: document.getElementById('edit_nombre').value,
                sn: document.getElementById('edit_sn').value,
                categoria: document.getElementById('edit_categoria').value,
                estado: document.getElementById('edit_estado').value,
                workstation_id: document.getElementById('edit_workstation').value,
                extra: extra
            };

            fetch(`/api/equipo/update/${id}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            }).then(() => {
                location.reload();
            });
        };
    </script>
</body>
</html>
